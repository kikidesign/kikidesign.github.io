---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}• {{ page.meta }}</p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

</div>
